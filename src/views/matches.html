<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planning — Ping Pong Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/globals.css">
  <link rel="stylesheet" href="../styles/matches.css">
</head>

<body>
  <div class="page">
    <header class="top-bar">
      <div class="logo-mark">
        <img src="../assets/images/HNO_Assenede_logo.png" alt="logo van HNO Assenede">
      </div>
      <nav class="navigation" aria-label="Primary">
        <a class="tab" href="./login.html">Log In</a>
        <a class="tab" href="./drinks.html">Order</a>
        <a class="tab active" href="./matches.html" aria-current="page">Planning</a>
        <a class="tab" href="#">My Account</a>
      </nav>
    </header>

    <header class="side-bar">
      <button id="menuBtn" class="menu" type="button" aria-label="Open menu">☰</button>
      <nav id="sideMenu" class="side-menu" aria-label="Mobile navigation">
        <button id="closeBtn" class="close-menu" type="button" aria-label="Close menu">✕</button>
        <a class="side" href="./login.html">Log In</a>
        <a class="side" href="./drinks.html">Order</a>
        <a class="side active" href="./matches.html" aria-current="page">Planning</a>
        <a class="side" href="#">My Account</a>
      </nav>
    </header>

    <main>
      <section class="planning-panel" aria-labelledby="available-heading">
        <h1 id="available-heading" class="panel-title">Beschikbare matchen:</h1>
        <div id="available-matches" class="available-grid" aria-live="polite"></div>
      </section>

      <section class="planning-panel my-matches-panel" aria-labelledby="my-matches-heading">
        <h2 id="my-matches-heading" class="panel-title">Mijn komende matchen:</h2>
        <div id="my-matches" class="my-matches-list" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script type="module" src="../js/showMatches.js"></script>
  <script type="module" src="../js/sideMenu.js"></script>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
