<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Payment — Ping Pong Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./src/styles/tokens.css" />
  <link rel="stylesheet" href="./src/styles/reset.css" />
  <link rel="stylesheet" href="./src/styles/globals.css" />
  <link rel="stylesheet" href="./src/styles/payment-return.css" />
</head>

<body>
  <div class="page">

    <header class="top-bar">
      <div class="logo-mark">🏓</div>
      <span class="brand">Ping Pong Hub</span>
    </header>

    <main class="payment-page">
      <section id="status-message" class="payment-card">
          <div class="payment-loader"></div>
          <h1 class="payment-title">
            Checking payment
          </h1>
          <p class="payment-text">
            Please wait while we confirm your payment.
          </p>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 Ping Pong Hub</p>
      <nav aria-label="Footer">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Support</a>
      </nav>
    </footer>

  </div>

  <script type="module" src="./src/js/payment-return.js"></script>
</body>
</html>
